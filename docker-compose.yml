# Milano Inbox - Docker Compose
version: '3.8'

services:
  app:
    build: .
    container_name: milano-inbox
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-milano-inbox-secret-change-in-production}
    volumes:
      # Persiste o banco de dados fora de /app (evita conflitos com a imagem)
      - milano-data:/data
      # Persiste os logos uploaded (public/uploads é gravado pela API /api/sites)
      - milano-uploads:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  milano-data:
    driver: local
  milano-uploads:
    driver: local
