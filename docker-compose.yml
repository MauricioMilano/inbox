# Milano Inbox - Docker Compose
version: '3.8'

services:
  app:
    build: .
    container_name: milano-inbox
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-milano-inbox-secret-change-in-production}
    volumes:
      # Persiste o banco de dados
      - milano-data:/app/prisma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  milano-data:
    driver: local
