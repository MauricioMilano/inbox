<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Milano Consulting icon">
  <title>Milano Consulting — icon</title>
  <defs>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8B96A"/>
      <stop offset="50%" stop-color="#D9A24B"/>
      <stop offset="100%" stop-color="#B07F2A"/>
    </linearGradient>
    <linearGradient id="goldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2C97E"/>
      <stop offset="100%" stop-color="#C9942F"/>
    </linearGradient>

    <!--
      CANONICAL LOGO MARK.
      Single source of truth. The same symbol appears in every logo SVG
      and is rendered (via resvg-py) into every PNG preview.
      Geometry:
        - 120x120 viewBox
        - 10px padding, 100x100 inner card
        - Card corner radius: 20
        - M strokes: 10px wide, sits inside the card with 20px side margins
        - M bottom at y=92, top at y=42 (height 50)
        - Inner V dips from y=42 to y=72 (apex depth 30)
        - Chat dot at top-right corner, r=5
    -->
    <symbol id="milano-mark" viewBox="0 0 120 120">
      <rect x="10" y="10" width="100" height="100" rx="20" fill="#0B0B0F"/>
      <rect x="10" y="10" width="100" height="100" rx="20" fill="none" stroke="url(#goldStroke)" stroke-width="1.5"/>

      <!--
        The M: left post | right-slanting diagonal down to apex | left-slanting diagonal up | right post.
        Coordinates chosen so that the M occupies the central 80x50 area.
        Stroke-style filled path using outer + inner contours (even-odd).
      -->
      <path fill="url(#goldFill)" fill-rule="evenodd" d="
        M 30 92
        L 30 42
        L 50 42
        L 60 64
        L 70 42
        L 90 42
        L 90 92
        L 78 92
        L 78 60
        L 66 92
        L 54 92
        L 42 60
        L 42 92
        Z
      "/>

      <!-- Chat-bubble dot at top-right corner -->
      <circle cx="98" cy="22" r="5" fill="#F2C97E"/>
      <circle cx="98" cy="22" r="5" fill="none" stroke="#0B0B0F" stroke-width="1.5"/>
    </symbol>
  </defs>

  <use href="#milano-mark"/>
</svg>
